<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Dealership</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
  body{
font-family: Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#111;
color:white;
padding:20px;
}

.car-container{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.car{
background:white;
padding:20px;
border-radius:10px;
width:250px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.car img{
width:100%;
border-radius:10px;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#cc0000;
}
</style>
<body>

<header>
<h1>🚗 Dream Car Dealership</h1>
<p>Find your perfect car</p>
</header>

<section class="car-container">

<div class="car">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" alt="Toyota">
<h2>Toyota Corolla</h2>
<p>$20,000</p>
<button onclick="buyCar('Toyota Corolla')">Buy Now</button>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1549921296-3c3b6a9b0c16" alt="Honda">
<h2>Honda Civic</h2>
<p>$22,000</p>
<button onclick="buyCar('Honda Civic')">Buy Now</button>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" alt="Mustang">
<h2>Ford Mustang</h2>
<p>$35,000</p>
<button onclick="buyCar('Ford Mustang')">Buy Now</button>
</div>

</section>

<script src="script.js"></script>
</body>
</html>
